body{background:#050508;font-family:system-ui,-apple-system,sans-serif;color:#fff;min-height:100vh}

.cd.dn{background:#060d06;border-color:#1a3a1a;opacity:.45}
.ci{padding:10px 12px;display:flex;gap:10px;align-items:flex-start}

.mg{margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:4px 8px}
.ml{color:#3a3a50;font-size:8px;font-weight:700;letter-spacing:1px;font-family:monospace}
.mv{font-size:11px;line-height:1.3;margin:1px 0 0}
.mv.dn{color:#2a2a2a}
.mv.ac{color:#8888aa}
.mf{grid-column:1/3}

.eb{margin-top:6px;background:#0c0c18;border:1px solid #1a1a2e;border-radius:5px;padding:3px 8px;font-size:9px;font-weight:700}
.ef{margin-top:8px;display:flex;flex-direction:column;gap:6px;padding-right:4px}
.ef textarea{width:100%;background:#06060c;border:1px solid #1a1a2e;color:#aaa;border-radius:5px;padding:6px 8px;font-size:11px;line-height:1.3}
.bl{padding:10px;padding-bottom:80px}
.bb{width:100%;display:flex;align-items:center;gap:10px;background:#09090f;border-radius:8px;padding:12px;margin-bottom:5px;text-align:left}
.be{font-size:18px}
.bn{font-size:13px;font-family:'Space Mono',monospace;color:#fff}
