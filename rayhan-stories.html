var bg=document.createElement('div');bg.id='modal-bg';
bg.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px';
var m='<div style="background:#0a0a12;border:1px solid #1a1a2e;border-radius:12px;padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto">';
m+='<h3 style="font-size:14px;font-family:monospace;margin-bottom:14px;color:#fff">'+title+'</h3>';
for(var i=0;i<fields.length;i++){
var f=fields[i];
m+='<div style="margin:10px 0 3px;color:#888;font-size:9px;font-weight:700;letter-spacing:1px;font-family:monospace">'+f.label+'</div>';
if(f.type==='select'){
m+='<select id="mf-'+f.id+'" style="width:100%;background:#060609;border:1px solid #1a1a2e;color:#ccc;border-radius:5px;padding:8px;font-size:12px;font-family:monospace">';
for(var j=0;j<f.options.length;j++){var o=f.options[j];m+='<option value="'+esc(o.v)+'"'+(o.v===f.val?' selected':'')+'>'+esc(o.l)+'</option>'}
m+='</select>';
}else if(f.type==='textarea'){
m+='<textarea id="mf-'+f.id+'" rows="3" style="width:100%;background:#060609;border:1px solid #1a1a2e;color:#ccc;border-radius:5px;padding:8px;font-size:12px;font-family:monospace;resize:vertical;box-sizing:border-box">'+esc(f.val)+'</textarea>';
}else{
m+='<input type="text" id="mf-'+f.id+'" value="'+esc(f.val)+'" style="width:100%;background:#060609;border:1px solid #1a1a2e;color:#ccc;border-radius:5px;padding:8px;font-size:12px;font-family:monospace;box-sizing:border-box">';
}
}
m+='<div style="display:flex;gap:8px;margin-top:16px">';
m+='<button style="flex:1;padding:10px;border-radius:7px;font-size:11px;font-weight:700;background:#1a1a2e;color:#888;font-family:monospace" onclick="CM()">Cancelar</button>';
m+='<button style="flex:1;padding:10px;border-radius:7px;font-size:11px;font-weight:700;background:#e94560;color:#fff;font-family:monospace" onclick="SM()">Salvar</button>';
m+='</div></div>';
bg.innerHTML=m;
document.body.appendChild(bg);
window._ms=onSave;window._mf=fields;
}

window.CM=function(){var m=document.getElementById('modal-bg');if(m)m.remove()};
window.SM=function(){
var v={};
for(var i=0;i<window._mf.length;i++){
var f=window._mf[i];
var el=document.getElementById('mf-'+f.id);
if(el)v[f.id]=el.value;
}
if(window._ms)window._ms(v);
CM();
};

window.SV=function(v){st.view=v;R()};
window.SD=function(d){st.day=d;R()};
window.TG=function(i){var k=st.day+'-'+i;st.done[k]=!st.done[k];save();R()};

window.ED=function(i){
var day=DAYS[st.day];var s=data[day][i];
var bo=[];for(var j=0;j<BLOCKS.length;j++){bo.push({v:BLOCKS[j].id,l:BLOCKS[j].e+' '+BLOCKS[j].n})}
showModal('Editar Story',[
{id:'t',label:'HORARIO',type:'text',val:s.t},
{id:'b',label:'BLOCO',type:'select',val:s.b,options:bo},
{id:'d',label:'DESCRICAO',type:'text',val:s.d},
{id:'fo',label:'FORMATO',type:'text',val:s.fo},
{id:'ce',label:'CENARIO',type:'text',val:s.ce},
{id:'el',label:'ELEMENTOS',type:'text',val:s.el},
{id:'fa',label:'FALA / TEXTO',type:'textarea',val:s.fa}
],function(v){data[day][i]={t:v.t,b:v.b,d:v.d,fo:v.fo,ce:v.ce,el:v.el,fa:v.fa};save();R()});
};

window.DEL=function(i){
if(!confirm('Remover este story?'))return;
var day=DAYS[st.day];data[day].splice(i,1);
var nd={};var keys=Object.keys(st.done);
for(var j=0;j<keys.length;j++){
var k=keys[j];var p=k.split('-');
if(parseInt(p[0])===st.day){var x=parseInt(p[1]);if(x<i)nd[k]=st.done[k];else if(x>i)nd[p[0]+'-'+(x-1)]=st.done[k]}
else{nd[k]=st.done[k]}
}
st.done=nd;save();R();
};

window.ADD=function(){
var bo=[];for(var j=0;j<BLOCKS.length;j++){bo.push({v:BLOCKS[j].id,l:BLOCKS[j].e+' '+BLOCKS[j].n})}
showModal('Novo Story',[
{id:'t',label:'HORARIO',type:'text',val:''},
{id:'b',label:'BLOCO',type:'select',val:'B3',options:bo},
{id:'d',label:'DESCRICAO',type:'text',val:''},
{id:'fo',label:'FORMATO',type:'text',val:''},
{id:'ce',label:'CENARIO',type:'text',val:''},
{id:'el',label:'ELEMENTOS',type:'text',val:''},
{id:'fa',label:'FALA / TEXTO',type:'textarea',val:''}
],function(v){var day=DAYS[st.day];data[day].push({t:v.t,b:v.b,d:v.d,fo:v.fo,ce:v.ce,el:v.el,fa:v.fa});save();R()});
};

window.OB=function(id){
var b=BM[id];var a=document.getElementById('app');
var h='<div style="padding:14px 10px 4px;display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;background:#e94560;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;font-family:monospace">R</div><div><div style="font-size:14px;font-family:monospace;font-weight:800;color:#fff">Rayhan Stories</div><div style="color:#2a2a2a;font-size:8px;font-family:monospace;letter-spacing:2px">CONTROLE DE STORIES</div></div></div>';
h+='<div style="display:flex;gap:4px;padding:6px 10px;position:sticky;top:0;background:#050508;z-index:50"><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:#0c0c18;color:#555" onclick="SV(\'daily\')">Dia</button><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:#e94560;color:#fff" onclick="SV(\'blocks\')">Blocos</button></div>';
h+='<div style="padding:10px;padding-bottom:80px">';
h+='<button style="background:#0c0c18;border:1px solid #1a1a2e;color:#555;border-radius:6px;padding:5px 12px;font-size:10px;font-family:monospace;margin-bottom:10px" onclick="SV(\'blocks\')"><- Voltar</button>';
h+='<div style="background:#09090f;border:1px solid '+b.c+'33;border-left:4px solid '+b.c+';border-radius:10px;padding:14px;margin-bottom:12px"><span style="font-size:16px">'+b.e+'</span><h2 style="color:#fff;font-size:17px;margin:4px 0 0;font-family:monospace">'+b.n+'</h2></div>';
for(var di=0;di<DAYS.length;di++){
var day=DAYS[di];
var items=[];var arr=data[day]||[];
for(var si=0;si<arr.length;si++){if(arr[si].b===id)items.push(arr[si])}
if(items.length===0)continue;
h+='<div style="margin-bottom:12px"><h3 style="color:'+b.c+';font-size:10px;font-family:monospace;font-weight:800;letter-spacing:1.5px;margin-bottom:5px">'+DAYS_DISPLAY[di].toUpperCase()+'</h3>';
for(var si=0;si<items.length;si++){
var s=items[si];
h+='<div style="background:#09090f;border:1px solid #141425;border-radius:7px;padding:8px 10px;margin-bottom:3px">';
h+='<div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="color:#ccc;font-size:11px;font-weight:600">'+esc(s.d)+'</span><span style="color:#e94560;font-size:10px;font-family:monospace;font-weight:800">'+esc(s.t)+'</span></div>';
h+='<div style="color:#555;font-size:9px;font-family:monospace">'+esc(s.fo)+' | '+esc(s.ce)+' | '+esc(s.el)+'</div>';
h+='<p style="color:#777;font-size:9px;font-family:monospace;font-style:italic;margin:3px 0 0">'+esc(s.fa)+'</p></div>';
}
h+='</div>';
}
h+='</div>';
a.innerHTML=h;
};

R();

}catch(globalErr){
document.getElementById('app').innerHTML='<div style="color:#e94560;padding:20px;font-family:monospace"><h2>Erro</h2><p style="margin-top:10px">'+globalErr.message+'</p><button style="margin-top:10px;padding:8px 16px;background:#e94560;color:#fff;border:none;border-radius:5px;font-family:monospace" onclick="localStorage.clear();location.reload()">Limpar cache e recarregar</button></div>';
}
</script>
</body>
</html>
