function buildWeek(w){var d={};DAYS.forEach(function(day){var m=manhaWeek(day,w);var fds=(day==="Sabado"||day==="Domingo");d[day]=m.concat(tardeWeek(w,fds))});return d}

var ANGLES={"Segunda":"Peso + contraste com sono","Terca":"Consistencia silenciosa","Quarta":"Metade da semana - Acumulado","Quinta":"DIA DO PROTOCOLO COMPLETO","Sexta":"O protocolo nao tira folga","Sabado":"Mesmo horario no fim de semana","Domingo":"Sono de hoje define a segunda"};
var WLABEL=["SEMANA 1 - Mostrar rotina","SEMANA 2 - Aprofundar","SEMANA 3 - Significado","SEMANA 4 - Marco"];
var st={day:0,view:"daily",week:0,done:{}};
try{var dow=new Date().getDay();st.day=dow===0?6:dow-1}catch(x){}
try{var sd=localStorage.getItem('rs4d');if(sd)st.done=JSON.parse(sd)}catch(x){}
try{var sw=localStorage.getItem('rs4w');if(sw)st.week=parseInt(sw)||0}catch(x){}
function getData(){return buildWeek(st.week)}
function save(){try{localStorage.setItem('rs4d',JSON.stringify(st.done));localStorage.setItem('rs4w',String(st.week))}catch(x){}}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'--'}

function R(){
try{
var data=getData();var a=document.getElementById('app');var h='';
h+='<div style="padding:14px 10px 4px;display:flex;align-items:center;gap:8px"><div style="width:28px;height:28px;background:#e94560;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:#fff;font-family:monospace">R</div><div><div style="font-size:14px;font-family:monospace;font-weight:800;color:#fff">Rayhan Stories</div><div style="color:#2a2a2a;font-size:8px;font-family:monospace;letter-spacing:2px">CONTROLE DE STORIES</div></div></div>';
h+='<div style="display:flex;gap:4px;padding:6px 10px;position:sticky;top:0;background:#050508;z-index:50"><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:'+(st.view==='daily'?'#e94560':'#0c0c18')+';color:'+(st.view==='daily'?'#fff':'#555')+'" onclick="SV(\'daily\')">Dia</button><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:'+(st.view==='blocks'?'#e94560':'#0c0c18')+';color:'+(st.view==='blocks'?'#fff':'#555')+'" onclick="SV(\'blocks\')">Blocos</button></div>';
h+='<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 10px"><button style="background:none;border:1px solid #222;color:#888;border-radius:50%;width:28px;height:28px;font-size:12px" onclick="SW(-1)"><</button><span style="color:#e94560;font-family:monospace;font-size:11px;font-weight:700;text-align:center;min-width:200px">'+WLABEL[st.week]+'</span><button style="background:none;border:1px solid #222;color:#888;border-radius:50%;width:28px;height:28px;font-size:12px" onclick="SW(1)">></button></div>';

}catch(err){document.getElementById('app').innerHTML='<div style="color:#e94560;padding:20px;font-family:monospace"><h2>Erro</h2><p>'+err.message+'</p><button style="margin-top:10px;padding:8px 16px;background:#e94560;color:#fff;border:none;border-radius:5px" onclick="localStorage.clear();location.reload()">Limpar e recarregar</button></div>'}}

function RD(data){

for(var i=0;i<t;i++){if(st.done[st.week+'-'+st.day+'-'+i])dc++}
var p=t>0?Math.round(dc/t*100):0;
var h='<div style="display:flex;gap:3px;padding:8px 10px;overflow-x:auto">';

for(var i=0;i<ss.length;i++){

h+='<p style="color:'+(dn?'#333':'#e8e8f0')+';font-size:13px;font-weight:600;line-height:1.3;margin:3px 0 0;text-decoration:'+(dn?'line-through':'none')+'">'+esc(s.d)+'</p>';

h+='<div><div style="color:#555;font-size:8px;font-weight:700;letter-spacing:1px;font-family:monospace">CENARIO</div><p style="color:'+(dn?'#2a2a2a':'#8888aa')+';font-size:11px;margin:1px 0 0">'+esc(s.ce)+'</p></div>';

h+='<div style="grid-column:1/3"><div style="color:#555;font-size:8px;font-weight:700;letter-spacing:1px;font-family:monospace">FALA / TEXTO</div><p style="color:'+(dn?'#2a2a2a':'#c0c0d8')+';font-size:11px;margin:1px 0 0;font-style:italic">'+esc(s.fa)+'</p></div>';
h+='</div>';
h+='<div style="margin-top:8px"><button style="background:#0c0c18;border:1px solid #1a1a2e;color:#888;border-radius:5px;padding:4px 10px;font-size:9px;font-weight:700;font-family:monospace" onclick="TG('+i+')">'+(dn?'Desfazer':'Feito')+'</button></div>';
h+='</div></div></div>';}
h+='<div style="height:60px"></div>';return h}

function RBL(data){
var h='<div style="padding:10px;padding-bottom:80px"><h2 style="font-size:15px;font-family:monospace;margin-bottom:10px;color:#fff">7 Blocos</h2>';
for(var j=0;j<BLOCKS.length;j++){var b=BLOCKS[j];var c=0;for(var di=0;di<DAYS.length;di++){var arr=data[DAYS[di]]||[];for(var si=0;si<arr.length;si++){if(arr[si].b===b.id)c++}}

h+='</div>';return h}

window.SV=function(v){st.view=v;R()};
window.SD=function(d){st.day=d;R()};
window.SW=function(dir){st.week=st.week+dir;if(st.week<0)st.week=3;if(st.week>3)st.week=0;save();R()};
window.TG=function(i){var k=st.week+'-'+st.day+'-'+i;st.done[k]=!st.done[k];save();R()};
window.OB=function(id){var data=getData();var b=BM[id];var a=document.getElementById('app');

h+='<div style="display:flex;gap:4px;padding:6px 10px;position:sticky;top:0;background:#050508;z-index:50"><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:#0c0c18;color:#555" onclick="SV(\'daily\')">Dia</button><button style="flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;font-family:monospace;background:#e94560;color:#fff" onclick="SV(\'blocks\')">Blocos</button></div>';
h+='<div style="padding:10px;padding-bottom:80px"><button style="background:#0c0c18;border:1px solid #1a1a2e;color:#555;border-radius:6px;padding:5px 12px;font-size:10px;font-family:monospace;margin-bottom:10px" onclick="SV(\'blocks\')"><- Voltar</button>';
h+='<div style="background:#09090f;border:1px solid '+b.c+'33;border-left:4px solid '+b.c+';border-radius:10px;padding:14px;margin-bottom:12px"><span style="font-size:16px">'+b.e+'</span><h2 style="color:#fff;font-size:17px;margin:4px 0 0;font-family:monospace">'+b.n+'</h2></div>';
for(var di=0;di<DAYS.length;di++){var day=DAYS[di];var items=[];var arr=data[day]||[];for(var si=0;si<arr.length;si++){if(arr[si].b===id)items.push(arr[si])}if(!items.length)continue;
h+='<div style="margin-bottom:12px"><h3 style="color:'+b.c+';font-size:10px;font-family:monospace;font-weight:800;letter-spacing:1.5px;margin-bottom:5px">'+DAYSD[di].toUpperCase()+'</h3>';

h+='</div>';a.innerHTML=h};
R();
}catch(e){document.getElementById('app').innerHTML='<div style="color:red;padding:20px;font-family:monospace">'+e.message+'<br><button onclick="localStorage.clear();location.reload()" style="margin-top:10px;padding:8px;background:#e94560;color:#fff;border:none;border-radius:5px">Reset</button></div>'}
