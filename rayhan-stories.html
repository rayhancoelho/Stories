function buildWeek(w){
var d={};
DAYS.forEach(function(day){
var m=manhaWeek(day,w);
var isFds=(day==="Sabado"||day==="Domingo");
var t=tardeWeek(w,isFds);
d[day]=m.concat(t);
});
return d;
}

var st={day:0,view:"daily",week:0,done:{}};
try{var dow=new Date().getDay();st.day=dow===0?6:dow-1}catch(x){st.day=0}

try{var sw=localStorage.getItem('rs4w');if(sw)st.week=parseInt(sw)||0}catch(x){}

function getData(){return buildWeek(st.week)}
function save(){try{localStorage.setItem('rs4d',JSON.stringify(st.done));localStorage.setItem('rs4w',String(st.week))}catch(x){}}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'):'--'}

function RBL(data){

window.TG=function(i){var k=st.week+'-'+st.day+'-'+i;st.done[k]=!st.done[k];save();R()};
