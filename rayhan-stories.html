function showModal(title,fields,onSave){
var bg=document.createElement(‘div’);bg.id=‘modal-bg’;
bg.style.cssText=‘position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px’;
var m=’<div style="background:#09090f;border:1px solid #1a1a2e;border-radius:12px;padding:20px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto"><h3 style="font-size:14px;font-family:\'Space Mono\',monospace;margin-bottom:14px;color:#fff">’+title+’</h3>’;
fields.forEach(function(f){
m+=’<div style="margin:10px 0 3px;color:#888;font-size:9px;font-weight:700;letter-spacing:1px;font-family:monospace">’+f.label+’</div>’;
if(f.type===‘select’){
m+=’<select id="modal-'+f.id+'" style="width:100%;background:#06060c;border:1px solid #1a1a2e;color:#aaa;border-radius:5px;padding:6px 8px;font-size:11px;font-family:monospace">’;
f.options.forEach(function(o){m+=’<option value=”’+esc(o.v)+’”’+(o.v===f.val?’ selected’:’’)+’>’+esc(o.l)+’</option>’});
m+=’</select>’;
}else if(f.type===‘textarea’){
m+=’<textarea id="modal-'+f.id+'" rows="2" style="width:100%;background:#06060c;border:1px solid #1a1a2e;color:#aaa;border-radius:5px;padding:6px 8px;font-size:11px;font-family:monospace;resize:vertical;box-sizing:border-box">’+esc(f.val)+’</textarea>’;
}else{
m+=’<input type="text" id="modal-'+f.id+'" value="'+esc(f.val)+'" style="width:100%;background:#06060c;border:1px solid #1a1a2e;color:#aaa;border-radius:5px;padding:6px 8px;font-size:11px;font-family:monospace;box-sizing:border-box">’;
}});
m+=’<div style="display:flex;gap:8px;margin-top:16px"><button style="flex:1;padding:10px;border-radius:7px;font-size:11px;font-weight:700;background:#1a1a2e;color:#888;font-family:monospace;cursor:pointer;border:none" onclick="closeModal()">Cancelar</button><button style="flex:1;padding:10px;border-radius:7px;font-size:11px;font-weight:700;background:#e94560;color:#fff;font-family:monospace;cursor:pointer;border:none" onclick="saveModal()">Salvar</button></div></div>’;
bg.innerHTML=m;document.body.appendChild(bg);
window._modalSave=onSave;window._modalFields=fields}

window.closeModal=function(){var m=document.getElementById(‘modal-bg’);if(m)m.remove()};
window.saveModal=function(){var v={};window._modalFields.forEach(function(f){var el=document.getElementById(‘modal-’+f.id);if(el)v[f.id]=el.value});if(window._modalSave)window._modalSave(v);closeModal()};

window.DEL=function(i){
if(!confirm(‘Remover este story?’))return;
var day=DAYS[st.day];data[day].splice(i,1);
var nd={};Object.keys(st.done).forEach(function(k){var p=k.split(’-’);if(parseInt(p[0])===st.day){var x=parseInt(p[1]);if(x<i)nd[k]=st.done[k];else if(x>i)nd[p[0]+’-’+(x-1)]=st.done[k]}else nd[k]=st.done[k]});
st.done=nd;save();R()};
